variables:
  GOLANG_VERSION:
    value: "1.26.5"
    description: "Go version to build the packages with. The toolchain is downloaded at build time from https://dl.google.com/go"

  # Mender Client LTS
  # NOTE: when adding variables here update also trigger from mender-qa:
  # https://github.com/mendersoftware/mender-qa/blob/master/gitlab-pipeline/stage/trigger-packages.yml
  MENDER_CLIENT_VERSION_INVENTORY_SCRIPT_VERSION:
    value: "main"
    description: "Version of mender-client-version-inventory-script"
  MENDER_VERSION:
    value: "master"
    description: "Version of mender repository"
  MENDER_CONNECT_VERSION:
    value: "master"
    description: "Version of mender-connect repository"
  MENDER_MONITOR_VERSION:
    value: "master"
    description: "Version of monitor-client repository"
  MENDER_FLASH_VERSION:
    value: "master"
    description: "Version of mender-flash repository"
  MENDER_CONFIGURE_VERSION:
    value: "master"
    description: "Version of mender-configure repository"
  MENDER_CONTAINER_MODULES_VERSION:
    value: "main"
    description: "Version of mender-container-modules repository"

  # Workstation tools
  MENDER_ARTIFACT_VERSION:
    value: "master"
    description: "Version of mender-artifact repository"
  MENDER_CLI_VERSION:
    value: "master"
    description: "Version of mender-cli repository"

  # Independent tools
  MENDER_SETUP_VERSION:
    value: "master"
    description: "Version of mender-setup repository"
  MENDER_SNAPSHOT_VERSION:
    value: "master"
    description: "Version of mender-snapshot repository"

  # Other LTS
  MENDER_GATEWAY_VERSION:
    value: "master"
    description: "Version of mender-gateway repository"
  MENDER_ORCHESTRATOR_VERSION:
    value: "main"
    description: "Version of mender-orchestrator repository"
  MENDER_ORCHESTRATOR_SUPPORT_VERSION:
    value: "main"
    description: "Version of mender-orchestrator-support repository"

  # Bucket name
  S3_BUCKET_NAME: "mender"
  S3_BUCKET_NAME_PRIVATE: "mender-binaries"
  AWS_S3_PUBLISH_ROLE_ARN: "arn:aws:iam::175683096866:role/nt-mender-dist-packages-s3-publishing"
  S3_BUCKET_SUBPATH_GATEWAY: "mender-gateway/debian"
  S3_BUCKET_SUBPATH_MONITOR: "mender-monitor/debian"
  S3_BUCKET_SUBPATH_ORCHESTRATOR: "mender-orchestrator/debian"
  # APT repo path for incoming packages (must be set/overwritten by individual
  # jobs, only listed here for reference/documentation and nicer errors in case
  # of not overwritten)
  S3_BUCKET_REPO_PATH: "invalid"
  # Scripts folder subpath
  S3_BUCKET_SCRIPTS_PATH: "repos/scripts"
  TEST_MENDER_DIST_PACKAGES:
    value: "true"
    options:
      - "true"
      - "false"
    description: "Whether to run acceptance tests"
  PUBLISH_MENDER_DIST_PACKAGES_AUTOMATIC:
    value: "false"
    options:
      - "true"
      - "false"
    description: |-
      Whether to publish packages automatically - they can always be published manually
  # Workaround for GitLab intermittent networking
  FF_NETWORK_PER_BUILD: 1
  # Builder image version
  IMAGE_VERSION:
    value: "master"
    description: "Builder images version. Useful in combination with PRs from mender-test-containers"
  # Debian suffix
  OVERRIDE_DEBIAN_SUFFIX:
    value: ""
    description: |-
      Overrides Debian suffix, which by default is "-1". Use it to manually build (and publish)
      a new version of a package from already released (git tagged) software.
  DEBIAN_EXTRA_CHANGELOG:
    value: ""
    description: |-
      Extra changelog text appended to the Debian packages built by mender-deb-package.
      Use `*` to separate bullet points, e.g. `* note one * note two`. Each bullet point is
      appended to debian/changelog with `dch -a` after the default "Release ..." entry.
      Use it when re-publishing packages with a newer Debian revision (e.g.
      mender-connect_3.0.0-2) to record a short note explaining the rebuild.

  BUILD_MENDER_CLIENT:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-client / mender-client4 package"
  BUILD_MENDER_CONNECT:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-connect package"
  BUILD_MENDER_CONFIGURE:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-configure package"
  BUILD_MENDER_CONTAINER_MODULES:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-container-modules package"
  BUILD_MENDER_ARTIFACT:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-artifact package"
  BUILD_MENDER_CLI:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-cli package"
  BUILD_MENDER_SETUP:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-setup package"
  BUILD_MENDER_SNAPSHOT:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-snapshot package"
  BUILD_MENDER_FLASH:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-flash package"
  BUILD_MENDER_CLIENT_VERSION_INVENTORY_SCRIPT:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-client-version-inventory-script package"
  BUILD_MENDER_GATEWAY:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-gateway package (commercial)"
  BUILD_MENDER_MONITOR:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-monitor package (commercial)"
  # TODO: BUILD_MENDER_ORCHESTRATOR=false / BUILD_MENDER_ORCHESTRATOR_SUPPORT=false
  # is not yet wired through the test job, because test_package_orchestrator.py
  # covers both packages and has no requires_option marker. Setting either of
  # these to "false" while still running tests will make those tests fail at
  # install time. Split the orchestrator test file per package first.
  BUILD_MENDER_ORCHESTRATOR:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-orchestrator package (commercial)"
  BUILD_MENDER_ORCHESTRATOR_SUPPORT:
    value: "true"
    options: ["true", "false"]
    description: "Build mender-orchestrator-support package (commercial)"

  # Don't slow down aws cli commands with connections to IMDS: we're not in AWS
  AWS_EC2_METADATA_DISABLED: "true"

include:
  - project: Northern.tech/Mender/mendertesting
    file:
      - qa-common/runner.yml
      - qa-common/retry.yml
  - component: gitlab.com/Northern.tech/Mender/mendertesting/commit-lint@master
  - project: 'Northern.tech/Mender/mendertesting'
    file: '.gitlab-ci-check-license.yml'
  - project: 'Northern.tech/Mender/mendertesting'
    file: '.gitlab-ci-check-python3-format.yml'
  - project: 'Northern.tech/Mender/mendertesting'
    file: '.gitlab-ci-github-status-updates.yml'
  - project: "Northern.tech/Mender/mendertesting"
    file: "qa-common/send-results-to-mantra.yml"
    ref: "master"
  - component: gitlab.com/Northern.tech/Mender/mendertesting/renovate@master
    inputs:
      stage: "renovate"

# NOTE: To add distributions, modify first the matrix in mender-test-containers repository
.mender-dist-packages-image-matrix-cross:
  parallel:
    matrix:
      - DISTRO: debian
        RELEASE: [bookworm, trixie]
        ARCH: [amd64, armhf, arm64]
      - DISTRO: ubuntu
        RELEASE: [noble, resolute]
        ARCH: [amd64, armhf, arm64]
.mender-dist-packages-workstation_tools-image-matrix-cross:
  parallel:
    matrix:
      - DISTRO: debian
        RELEASE: [bookworm, trixie]
        ARCH: [amd64, arm64]
      - DISTRO: ubuntu
        RELEASE: [noble, resolute]
        ARCH: [amd64, arm64]

.dind-login: &dind-login
  - mkdir -p $HOME/.docker && echo $DOCKER_AUTH_CONFIG > $HOME/.docker/config.json
  - for retry in 1 2 3 4 5; do docker login --username $CI_REGISTRY_USER --password $CI_REGISTRY_PASSWORD $CI_REGISTRY && break || sleep $retry; done

.aws-oidc-auth: &aws-oidc-auth
  - >
    export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s"
    $(aws sts assume-role-with-web-identity
    --role-arn ${AWS_S3_PUBLISH_ROLE_ARN}
    --role-session-name "GitLabRunner-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
    --web-identity-token ${AWS_OIDC_TOKEN}
    --duration-seconds 900
    --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]'
    --output text))
  - aws sts get-caller-identity

.requires-docker: &requires-docker
  - DOCKER_RETRY_SLEEP_S=2
  - DOCKER_RUNNING=false
  - for try in 4 3 2 1; do
  -  docker ps && DOCKER_RUNNING=true
  -  if [ "${DOCKER_RUNNING}" == "true" ]; then
  -   break
  -  fi
  -  sleep "${DOCKER_RETRY_SLEEP_S}"
  - done
  - if [ "${DOCKER_RUNNING}" != "true" ]; then
  -  exit 192
  - fi

.wait-for-s3-lock: &wait-for-s3-lock
  - *aws-oidc-auth
  # Lock the bucket to block concurrent jobs
  - while aws s3 ls s3://$S3_BUCKET_NAME/$S3_BUCKET_REPO_PATH/lock; do
  -   rm -f /tmp/lock.in
  -   aws s3 cp s3://$S3_BUCKET_NAME/$S3_BUCKET_REPO_PATH/lock /tmp/lock.in
  -   echo "$S3_BUCKET_REPO_PATH locked by:"
  -   cat /tmp/lock.in
  -   echo "waiting 10s"
  -   sleep 10
  - done
  - rm -f /tmp/lock.in lock
  - echo "${CI_PIPELINE_ID}.${CI_PROJECT_NAME}" >> lock
  - aws s3 mv lock s3://$S3_BUCKET_NAME/$S3_BUCKET_REPO_PATH/lock

.release-s3-lock: &release-s3-lock
  - *aws-oidc-auth
  - aws s3 rm s3://$S3_BUCKET_NAME/$S3_BUCKET_REPO_PATH/lock

.upload-packages-to-s3: &upload-packages-to-s3
  # Upload files: first .buildinfo and .deb, then .changes
  - for d in output/opensource/*; do
  -   find "$d" -name '*.buildinfo' -o -name '*.deb' -o -name '*.ddeb' -o -name '*.orig.tar.*' -o -name '*.debian.tar.*' -o -name '*.dsc' | while read -r file; do
  -     aws s3 cp "$file" "s3://$S3_BUCKET_NAME/$S3_BUCKET_REPO_PATH/${d}/"
  -   done
  -   find "$d" -name '*.changes' | while read -r file; do
  -     aws s3 cp "$file" "s3://$S3_BUCKET_NAME/$S3_BUCKET_REPO_PATH/${d}/"
  -   done
  - done

# Helper used by every build job to honor the per-package BUILD_<PKG> toggles.
# The case-statement is the single source of truth mapping a package name to
# its toggle. mender-client and mender-client4 share BUILD_MENDER_CLIENT
# because they are the same package built from different source trees.
# Unknown package names exit non-zero to catch typos early instead of
# silently building (or silently skipping) the wrong recipe.
.maybe-build: &maybe-build
  - |
    maybe_build() {
      pkg="$4"
      case "$pkg" in
        mender-client|mender-client4)            toggle="${BUILD_MENDER_CLIENT:-true}" ;;
        mender-connect)                          toggle="${BUILD_MENDER_CONNECT:-true}" ;;
        mender-configure)                        toggle="${BUILD_MENDER_CONFIGURE:-true}" ;;
        mender-container-modules)                toggle="${BUILD_MENDER_CONTAINER_MODULES:-true}" ;;
        mender-artifact)                         toggle="${BUILD_MENDER_ARTIFACT:-true}" ;;
        mender-cli)                              toggle="${BUILD_MENDER_CLI:-true}" ;;
        mender-setup)                            toggle="${BUILD_MENDER_SETUP:-true}" ;;
        mender-snapshot)                         toggle="${BUILD_MENDER_SNAPSHOT:-true}" ;;
        mender-flash)                            toggle="${BUILD_MENDER_FLASH:-true}" ;;
        mender-client-version-inventory-script)  toggle="${BUILD_MENDER_CLIENT_VERSION_INVENTORY_SCRIPT:-true}" ;;
        mender-gateway)                          toggle="${BUILD_MENDER_GATEWAY:-true}" ;;
        mender-monitor)                          toggle="${BUILD_MENDER_MONITOR:-true}" ;;
        mender-orchestrator)                     toggle="${BUILD_MENDER_ORCHESTRATOR:-true}" ;;
        mender-orchestrator-support)             toggle="${BUILD_MENDER_ORCHESTRATOR_SUPPORT:-true}" ;;
        *) echo "ERROR: maybe_build: unknown package $pkg" >&2; exit 1 ;;
      esac
      if [ "$toggle" = "true" ]; then
        ./docker-build-package "$@"
      else
        echo "Skipping $pkg (BUILD_<PKG>=$toggle)"
      fi
    }

.build:base:
  before_script:
    - *dind-login
    - *requires-docker
  retry:
    max: 2
    exit_codes:
      - 137
      - 192

default:
  tags: !reference [.qa-common-default-runner, tags]
  retry: !reference [.qa-common-default-retry, retry]

stages:
  - renovate
  - test:static
  - build:orig
  - build:packages
  - test
  - publish

build:orig:all:
  stage: build:orig
  extends: .build:base
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "production"
      when: never
    - when: on_success
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/docker:26-cli
  tags:
    - mender-qa-worker-generic
  services:
    - name: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/docker:26-dind
      alias: docker
  variables:
    DISTRO: "debian"
    RELEASE: "bookworm"
    ARCH: "amd64"
  script:
    - apk --update --no-cache add bash
    - *maybe-build
    - if [[ "${MENDER_VERSION}" =~ ^3\..* ]]; then
    -   maybe_build $DISTRO $RELEASE $ARCH mender-client $MENDER_VERSION true
    - else
    -   maybe_build $DISTRO $RELEASE $ARCH mender-client4 $MENDER_VERSION true
    - fi
    - maybe_build $DISTRO $RELEASE $ARCH mender-connect $MENDER_CONNECT_VERSION true
    - maybe_build $DISTRO $RELEASE $ARCH mender-configure $MENDER_CONFIGURE_VERSION true
    - maybe_build $DISTRO $RELEASE $ARCH mender-container-modules $MENDER_CONTAINER_MODULES_VERSION true
    - maybe_build $DISTRO $RELEASE $ARCH mender-artifact $MENDER_ARTIFACT_VERSION true
    - maybe_build $DISTRO $RELEASE $ARCH mender-cli $MENDER_CLI_VERSION true
    - maybe_build $DISTRO $RELEASE $ARCH mender-setup $MENDER_SETUP_VERSION true
    - maybe_build $DISTRO $RELEASE $ARCH mender-snapshot $MENDER_SNAPSHOT_VERSION true
    - maybe_build $DISTRO $RELEASE $ARCH mender-flash $MENDER_FLASH_VERSION true
    - maybe_build $DISTRO $RELEASE $ARCH mender-client-version-inventory-script $MENDER_CLIENT_VERSION_INVENTORY_SCRIPT_VERSION true
    - find output -type f
  artifacts:
    paths:
      - output/orig

build:pkgs:device-components:
  stage: build:packages
  extends: .build:base
  needs:
    - build:orig:all
  rules:
    - if: $CI_COMMIT_BRANCH == "production"
      when: never
    - when: on_success
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/docker:26-cli
  tags:
    - hetzner-amd-beefy
  services:
    - name: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/docker:26-dind
      alias: docker
  script:
    - apk --update --no-cache add bash
    - *maybe-build
    - if [[ "${MENDER_VERSION}" =~ ^3\..* ]]; then
    -   maybe_build $DISTRO $RELEASE $ARCH mender-client $MENDER_VERSION
    - else
    -   maybe_build $DISTRO $RELEASE $ARCH mender-client4 $MENDER_VERSION
    - fi
    - maybe_build $DISTRO $RELEASE $ARCH mender-connect $MENDER_CONNECT_VERSION
    - maybe_build $DISTRO $RELEASE $ARCH mender-configure $MENDER_CONFIGURE_VERSION
    - maybe_build $DISTRO $RELEASE $ARCH mender-container-modules $MENDER_CONTAINER_MODULES_VERSION
    - maybe_build $DISTRO $RELEASE $ARCH mender-setup $MENDER_SETUP_VERSION
    - maybe_build $DISTRO $RELEASE $ARCH mender-snapshot $MENDER_SNAPSHOT_VERSION
    - maybe_build $DISTRO $RELEASE $ARCH mender-flash $MENDER_FLASH_VERSION
    - maybe_build $DISTRO $RELEASE $ARCH mender-client-version-inventory-script $MENDER_CLIENT_VERSION_INVENTORY_SCRIPT_VERSION
    - if [ -n "${MENDER_PRIVATE_REPO_ACCESS_TOKEN}" ]; then
    -   maybe_build $DISTRO $RELEASE $ARCH mender-gateway $MENDER_GATEWAY_VERSION
    -   maybe_build $DISTRO $RELEASE $ARCH mender-monitor $MENDER_MONITOR_VERSION
    -   maybe_build $DISTRO $RELEASE $ARCH mender-orchestrator $MENDER_ORCHESTRATOR_VERSION
    -   maybe_build $DISTRO $RELEASE $ARCH mender-orchestrator-support $MENDER_ORCHESTRATOR_SUPPORT_VERSION
    - fi
    - find output -type f
  artifacts:
    paths:
      - output/commercial
      - output/opensource
  parallel: !reference [.mender-dist-packages-image-matrix-cross, parallel]

build:pkgs:workstation-tools:
  stage: build:packages
  extends: .build:base
  needs:
    - build:orig:all
  rules:
    - if: $CI_COMMIT_BRANCH == "production"
      when: never
    - when: on_success
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/docker:26-cli
  tags:
    - hetzner-amd-beefy
  services:
    - name: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/docker:26-dind
      alias: docker
  script:
    - apk --update --no-cache add bash
    - *maybe-build
    - maybe_build $DISTRO $RELEASE $ARCH mender-artifact $MENDER_ARTIFACT_VERSION
    - maybe_build $DISTRO $RELEASE $ARCH mender-cli $MENDER_CLI_VERSION
    - find output -type f
  artifacts:
    paths:
      - output/opensource
  parallel: !reference [.mender-dist-packages-workstation_tools-image-matrix-cross, parallel]

test:check-license:
  stage: test:static
  rules:
    - if: '$TEST_MENDER_DIST_PACKAGES == "true"'

test:check-license-source:
  stage: test:static

test:check-python3-formatting:
  stage: test:static
  rules:
    - if: '$TEST_MENDER_DIST_PACKAGES == "true"'

# This template setups the Docker based environment to test the packages
# from a specified Debian version
.test:pkgs:
  stage: test
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/docker:dind
  tags:
    #- mender-qa-worker-generic
    - hetzner-amd-beefy
  # Bellow will be overwritten in the final pipeline definition with something like
  # "build:pkgs:workstation-tools: [debian, trixie, amd64]"
  needs: []
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    # Bellow two variables need to be defined in the final pipeline and
    # match each other to property reflect Debian version
    # OS_FAMILY (example: debian)
    # OS_VERSION  (example: 13)
    # OS_VERSION_NAME  (example: "trixie")
  before_script:
    # DinD setup in Mender CI runners
    - unset DOCKER_HOST
    - unset DOCKER_TLS_VERIFY
    - unset DOCKER_CERT_PATH
    # Start dockerd in the background
    - /usr/local/bin/dockerd &
    # Wait for dockerd to start
    - |-
      MAX_WAIT=30
      while [ ! -e "/var/run/docker.sock" ] && [ $MAX_WAIT -gt 0 ]; do
        MAX_WAIT=$(($MAX_WAIT - 1))
        sleep 1
      done
    # Verify that the docker server is up and running
    - docker version
    # Git submodules
    - apk --update --no-cache add git
    - git submodule sync --recursive
    - git submodule update --init --recursive
    - git submodule status --recursive
    # Log in to pull test image from registry.gitlab.com
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    # Install dependencies
    - apk --update --no-cache add python3 py3-pip gcc openssh-client make openssl-dev
      libffi-dev libc-dev python3-dev bash musl-dev rust cargo curl jq
    - PIP_BREAK_SYSTEM_PACKAGES=1 pip3 install -r tests/requirements.txt
  script:
    - cd tests
    - |-
        pkg_flags=""
        # Only adds the pytest --foo-version / --foo-deb-version pair when the
        # build job for that package produced a deb-version artifact (i.e. the
        # package was actually built).
        maybe_add_pkg_flag() {
          local pkg="$1" version="$2" filename="$3"
          local path="${CI_PROJECT_DIR}/output/opensource/${OS_FAMILY}-${OS_VERSION_NAME}-amd64/$filename"
          if [ -f "$path" ]; then
            pkg_flags="$pkg_flags --$pkg-version $version --$pkg-deb-version $(cat "$path")"
          else
            echo "Skipping $pkg in pytest args: $path not present"
          fi
        }
        maybe_add_pkg_flag mender-client "$MENDER_VERSION" mender-client4-deb-version
        maybe_add_pkg_flag mender-connect "$MENDER_CONNECT_VERSION" mender-connect-deb-version
        maybe_add_pkg_flag mender-configure "$MENDER_CONFIGURE_VERSION" mender-configure-deb-version
        maybe_add_pkg_flag mender-setup "$MENDER_SETUP_VERSION" mender-setup-deb-version
        maybe_add_pkg_flag mender-snapshot "$MENDER_SNAPSHOT_VERSION" mender-snapshot-deb-version
        maybe_add_pkg_flag mender-flash "$MENDER_FLASH_VERSION" mender-flash-deb-version
        maybe_add_pkg_flag mender-container-modules "$MENDER_CONTAINER_MODULES_VERSION" mender-container-modules-deb-version
        maybe_add_pkg_flag mender-client-version-inventory-script "$MENDER_CLIENT_VERSION_INVENTORY_SCRIPT_VERSION" mender-client-version-inventory-script-deb-version

        COMMERCIAL_OUTPUT="${CI_PROJECT_DIR}/output/commercial/${OS_FAMILY}-${OS_VERSION_NAME}-amd64"
        commercial_tests_flags=""
        if [ -f "$COMMERCIAL_OUTPUT/mender-gateway-deb-version" ] &&
           [ -f "$COMMERCIAL_OUTPUT/mender-monitor-deb-version" ]; then
          commercial_tests_flags="--commercial-tests"
          commercial_tests_flags="$commercial_tests_flags --mender-gateway-version $MENDER_GATEWAY_VERSION"
          commercial_tests_flags="$commercial_tests_flags --mender-gateway-deb-version $(cat $COMMERCIAL_OUTPUT/mender-gateway-deb-version)"
          commercial_tests_flags="$commercial_tests_flags --mender-monitor-version $MENDER_MONITOR_VERSION"
          commercial_tests_flags="$commercial_tests_flags --mender-monitor-deb-version $(cat $COMMERCIAL_OUTPUT/mender-monitor-deb-version)"
          commercial_tests_flags="$commercial_tests_flags --mender-orchestrator-version $MENDER_ORCHESTRATOR_VERSION"
          commercial_tests_flags="$commercial_tests_flags --mender-orchestrator-deb-version $(cat $COMMERCIAL_OUTPUT/mender-orchestrator-deb-version)"
          # NOTE: Although mender-orchestrator-support is built with no closed source secrets, it cannot be tested without mender-orchestrator so it belongs to "commercial tests"
          commercial_tests_flags="$commercial_tests_flags --mender-orchestrator-support-version $MENDER_ORCHESTRATOR_SUPPORT_VERSION"
          commercial_tests_flags="$commercial_tests_flags --mender-orchestrator-support-deb-version $(cat $COMMERCIAL_OUTPUT/mender-orchestrator-support-deb-version)"
        fi

        # Fail loudly if no packages were built at all, otherwise pytest would
        # silently skip every test and the test job would falsely report green.
        if [ -z "${pkg_flags}${commercial_tests_flags}" ]; then
          echo "ERROR: no packages produced *-deb-version artifacts; refusing to run pytest with empty arguments" >&2
          exit 1
        fi
    - python3 -m pytest -v
      ${pkg_flags}
      ${commercial_tests_flags}
      --junit-xml results.xml
  after_script:
  - export MANTRA_PROJECT_NAME="client_general"
  - !reference [.mantra-push-results]
  artifacts:
    reports:
      junit: tests/results.xml

.test:pkgs:device-components:
  extends: .test:pkgs
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/arm32v7/${OS_FAMILY}:${OS_VERSION_NAME}
  tags:
    - hetzner-arm
  rules:
    - if: $CI_COMMIT_BRANCH == "production"
      when: never
    - if: '$TEST_MENDER_DIST_PACKAGES == "true" && $MENDER_VERSION =~ /^[456789]\.[0-9x]\.[0-9x]/'
    - if: '$TEST_MENDER_DIST_PACKAGES == "true" && $MENDER_VERSION == "master"'
  before_script:
    - !reference [.qa-common-network-apt-retry, before_script]
    - apt-get update
    - apt-get -yyq install bash git python3-pip wget sudo python3-venv
    - git submodule sync --recursive
    - git submodule update --init --recursive
    - git submodule status --recursive
    - python3 -m venv venv
    - source venv/bin/activate
    - PIP_BREAK_SYSTEM_PACKAGES=1 pip3 install -r tests/requirements.txt

