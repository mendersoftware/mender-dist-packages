.template:publish:s3:
  dependencies:
    - 'build:pkgs:device-components: [debian, bookworm, amd64]'
    - 'build:pkgs:device-components: [debian, bookworm, arm64]'
    - 'build:pkgs:device-components: [debian, bookworm, armhf]'
    - 'build:pkgs:device-components: [debian, trixie, amd64]'
    - 'build:pkgs:device-components: [debian, trixie, arm64]'
    - 'build:pkgs:device-components: [debian, trixie, armhf]'
    - 'build:pkgs:device-components: [ubuntu, noble, armhf]'
    - 'build:pkgs:device-components: [ubuntu, noble, arm64]'
    - 'build:pkgs:device-components: [ubuntu, noble, amd64]'
    - 'build:pkgs:device-components: [ubuntu, resolute, armhf]'
    - 'build:pkgs:device-components: [ubuntu, resolute, arm64]'
    - 'build:pkgs:device-components: [ubuntu, resolute, amd64]'
  stage: publish
  image: registry.gitlab.com/northern.tech/mender/mender-test-containers/base-debian:master
  id_tokens:
    AWS_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - *aws-oidc-auth
    - *publish_helper_functions
  script:
    - echo "Publishing ${PUBLISH_PACKAGE_PREFIX} version ${PUBLISH_PACKAGE_VERSION} to s3://${S3_BUCKET_NAME_PRIVATE}/${PUBLISH_PACKAGE_S3_SUBPATH}/${PUBLISH_PACKAGE_VERSION}/"
    - find output/commercial -name "${PUBLISH_PACKAGE_PREFIX}*.deb" | while read -r file; do
    -   aws s3 cp "$file" s3://${S3_BUCKET_NAME_PRIVATE}/${PUBLISH_PACKAGE_S3_SUBPATH}/${PUBLISH_PACKAGE_VERSION}/
    #   Make copy for "master" to be consumed by get.mender.io script:
    -   if [ "${PUBLISH_PACKAGE_VERSION}" == "master" ]; then
    -     copy_filename=$(basename "$file" | sed 's/_[^\+]*/_master-1/; s/\+builder[^_]*//')
    -     aws s3 cp "$file" s3://${S3_BUCKET_NAME_PRIVATE}/${PUBLISH_PACKAGE_S3_SUBPATH}/${PUBLISH_PACKAGE_VERSION}/${copy_filename}
    -   fi
    - done

